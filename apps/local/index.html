<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小红书卡片生成器</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #ede8de;
      color: #171714;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .app {
      height: 100vh;
      display: grid;
      grid-template-columns: 390px minmax(0, 1fr);
      overflow: hidden;
    }
    .panel {
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 28px;
      background: #fbf7ee;
      border-right: 1px solid rgba(23, 23, 20, 0.14);
      height: 100vh;
      overflow-y: auto;
      overscroll-behavior: contain;
    }
    .eyebrow {
      margin: 0 0 6px;
      color: #9b3f30;
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.05;
    }
    label {
      display: grid;
      gap: 7px;
      color: #62584c;
      font-size: 13px;
      font-weight: 700;
    }
    .field-note {
      margin: -2px 0 0;
      color: #8a8176;
      font-size: 11px;
      line-height: 1.35;
      font-weight: 500;
    }
    input, textarea, button {
      font: inherit;
    }
    input, textarea {
      width: 100%;
      border: 1px solid rgba(23, 23, 20, 0.18);
      border-radius: 8px;
      background: #fffdf8;
      color: #171714;
    }
    input {
      height: 40px;
      padding: 0 12px;
    }
    textarea {
      min-height: 210px;
      padding: 12px;
      resize: vertical;
      line-height: 1.5;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    button {
      height: 42px;
      border: 1px solid rgba(23, 23, 20, 0.18);
      border-radius: 8px;
      background: #ede5d8;
      color: #171714;
      font-weight: 800;
      cursor: pointer;
    }
    button:hover { background: #e4d8c8; }
    .primary {
      border-color: #9b3f30;
      background: #b94b37;
      color: #fff8ef;
    }
    .primary:hover { background: #a84231; }
    .status {
      min-height: 42px;
      margin: 0;
      padding: 12px;
      border-radius: 8px;
      background: #eee7db;
      color: #3b352d;
      font-size: 13px;
      line-height: 1.35;
    }
    .status[data-tone="success"] { background: #e0ecdc; color: #284c2a; }
    .status[data-tone="warning"] { background: #f2e4c7; color: #6b4b16; }
    .status[data-tone="error"] { background: #f1d7d2; color: #7a271c; }
    .preview {
      min-width: 0;
      height: 100vh;
      overflow: auto;
      padding: 24px;
    }
    iframe {
      width: 100%;
      height: calc(100vh - 48px);
      border: 1px solid rgba(23, 23, 20, 0.14);
      border-radius: 8px;
      background: #fff;
    }
    .hint {
      margin: 0;
      color: #7b7063;
      font-size: 12px;
      line-height: 1.45;
    }
    select {
      width: 100%;
      height: 40px;
      padding: 0 12px;
      border: 1px solid rgba(23, 23, 20, 0.18);
      border-radius: 8px;
      background: #fffdf8;
      color: #171714;
      font: inherit;
    }
    .busy-overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(237, 232, 222, 0.72);
      backdrop-filter: blur(4px);
    }
    .busy-overlay.active {
      display: flex;
    }
    .busy-box {
      width: min(360px, calc(100vw - 48px));
      padding: 22px 24px;
      border: 1px solid rgba(23, 23, 20, 0.14);
      border-radius: 10px;
      background: #fbf7ee;
      box-shadow: 0 18px 60px rgba(23, 23, 20, 0.16);
    }
    .busy-title {
      margin: 0 0 8px;
      color: #171714;
      font-size: 17px;
      font-weight: 850;
    }
    .busy-text {
      margin: 0;
      color: #62584c;
      font-size: 13px;
      line-height: 1.45;
    }
    body.is-busy .app {
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="panel">
      <header>
        <p class="eyebrow">Markdown 转图文卡片</p>
        <h1>小红书卡片生成器</h1>
      </header>

      <label>
        Markdown 文件
        <input id="file" type="file" accept=".md,.markdown,.mdown,text/markdown,text/plain" />
      </label>

      <label>
        Markdown 内容
        <textarea id="markdown" placeholder="选择一个 Markdown 文件，或直接粘贴内容"></textarea>
      </label>

      <div class="grid">
        <label>
          标题
          <input id="title" placeholder="可选，不填则读取文章标题" />
        </label>
        <label>
          底部署名
          <input id="brand" placeholder="显示在卡片底部" />
        </label>
        <label>
          主题风格
          <select id="theme">
            <option value="warm-tech">暖色技术风</option>
            <option value="clean-white">清爽白底</option>
            <option value="dark-code">深色代码风</option>
            <option value="mint-editorial">薄荷杂志风</option>
          </select>
        </label>
        <label>
          每页字数
          <input id="maxChars" type="number" min="120" value="360" />
          <span class="field-note">控制每张卡片的文字密度，越小拆页越多。</span>
        </label>
        <label>
          每页块数
          <input id="maxBlocks" type="number" min="1" value="4" />
          <span class="field-note">段落、列表、代码块、表格都会算作内容块。</span>
        </label>
      </div>

      <label>
        输出文件夹路径
        <input id="outputDir" placeholder="可选，默认保存到桌面 xhs-cardgen-exports" />
      </label>

      <label>
        Chrome 或 Edge 路径
        <input id="chromePath" placeholder="留空时自动检测" />
      </label>

      <p class="hint">PNG 导出由本地服务调用系统 Chrome 或 Edge 完成，文件会直接写入输出文件夹。</p>
      <p class="hint">当前版本只使用规则解析和分页，不会调用 LLM 大模型改写或筛选内容。</p>

      <div class="actions">
        <button id="preview">预览</button>
        <button id="save">保存 HTML/JSON</button>
        <button id="png" class="primary">导出 PNG</button>
      </div>

      <p id="status" class="status">准备就绪</p>
    </aside>

    <main class="preview">
      <iframe id="frame" title="Card preview"></iframe>
    </main>
  </div>

  <div id="busyOverlay" class="busy-overlay" aria-live="polite" aria-busy="true">
    <div class="busy-box">
      <p id="busyTitle" class="busy-title">正在处理</p>
      <p id="busyText" class="busy-text">请稍候，当前操作完成前暂时不能编辑或重复点击。</p>
    </div>
  </div>

  <script>
    const els = {
      file: document.querySelector("#file"),
      markdown: document.querySelector("#markdown"),
      title: document.querySelector("#title"),
      brand: document.querySelector("#brand"),
      theme: document.querySelector("#theme"),
      maxChars: document.querySelector("#maxChars"),
      maxBlocks: document.querySelector("#maxBlocks"),
      outputDir: document.querySelector("#outputDir"),
      chromePath: document.querySelector("#chromePath"),
      preview: document.querySelector("#preview"),
      save: document.querySelector("#save"),
      png: document.querySelector("#png"),
      status: document.querySelector("#status"),
      frame: document.querySelector("#frame"),
      busyOverlay: document.querySelector("#busyOverlay"),
      busyTitle: document.querySelector("#busyTitle"),
      busyText: document.querySelector("#busyText"),
    };

    let filename = "article.md";
    let currentDeck = null;
    let currentHtml = "";
    let busy = false;

    function setStatus(message, tone = "neutral") {
      els.status.textContent = message;
      els.status.dataset.tone = tone;
    }

    function setBusy(value, title = "正在处理", text = "请稍候，当前操作完成前暂时不能编辑或重复点击。") {
      busy = value;
      document.body.classList.toggle("is-busy", value);
      els.busyOverlay.classList.toggle("active", value);
      els.busyTitle.textContent = title;
      els.busyText.textContent = text;
      for (const control of document.querySelectorAll("input, textarea, select, button")) {
        control.disabled = value;
      }
    }

    function payload() {
      return {
        markdown: els.markdown.value,
        filename,
        title: els.title.value.trim(),
        brand: els.brand.value.trim(),
        theme: els.theme.value,
        maxCharactersPerSlide: Number(els.maxChars.value || 360),
        maxBlocksPerSlide: Number(els.maxBlocks.value || 4),
        outputDir: els.outputDir.value.trim(),
        chromePath: els.chromePath.value.trim(),
      };
    }

    async function postJson(url, data) {
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data),
      });
      const json = await res.json();
      if (!res.ok || json.error) throw new Error(json.error || "Request failed.");
      return json;
    }

    async function renderPreview() {
      if (!els.markdown.value.trim()) {
        setStatus("请先选择 Markdown 文件，或粘贴内容。", "error");
        return null;
      }
      setStatus("正在生成预览...");
      const result = await postJson("/api/render", payload());
      currentDeck = result.deck;
      currentHtml = result.html;
      els.frame.srcdoc = makePreviewHtml(currentHtml, currentDeck);
      if (currentDeck.slides.length > 18) {
        setStatus(`预览已生成：共 ${currentDeck.slides.length} 张卡片。小红书一次最多发布 18 张图片，建议调大每页字数/块数，或拆成多篇发布。`, "warning");
      } else {
        setStatus(`预览已生成：共 ${currentDeck.slides.length} 张卡片。`, "success");
      }
      return result;
    }

    function makePreviewHtml(html, deck) {
      const width = deck.width || 1242;
      const height = deck.height || 1660;
      const scale = 0.32;
      const gap = 32;
      const columns = 2;
      const stageWidth = width * columns + gap;
      const previewCss = `
        <style>
          html, body { min-height: ${Math.ceil(height * scale) + 80}px; overflow: auto; }
          .stage {
            grid-template-columns: repeat(${columns}, ${width}px) !important;
            gap: ${gap}px !important;
            transform: scale(${scale});
            transform-origin: top left;
            width: ${stageWidth}px !important;
            padding: 24px !important;
          }
        </style>
      `;
      return html.replace("</head>", `${previewCss}</head>`);
    }

    els.file.addEventListener("change", async () => {
      if (busy) return;
      const file = els.file.files[0];
      if (!file) return;
      filename = file.name;
      els.markdown.value = await file.text();
      setStatus(`已读取 ${file.name}。`);
    });

    els.preview.addEventListener("click", async () => {
      if (busy) return;
      try {
        setBusy(true, "正在生成预览", "正在解析 Markdown 并生成卡片预览。");
        await renderPreview();
      } catch (error) {
        setStatus(error.message, "error");
      } finally {
        setBusy(false);
      }
    });

    els.save.addEventListener("click", async () => {
      if (busy) return;
      try {
        if (!els.markdown.value.trim()) {
          setStatus("请先选择 Markdown 文件，或粘贴内容。", "error");
          return;
        }
        setBusy(true, "正在保存文件", "正在检查分页并写入 HTML/JSON。");
        setStatus("正在保存预览文件...");
        const result = await postJson("/api/save", payload());
        await postJson("/api/open", { path: result.outputDir });
        if (result.report?.exceedsXhsLimit) {
          setStatus(`已保存到 ${result.outputDir}。当前共 ${result.report.slideCount} 张，超过小红书单次 18 张上限。`, "warning");
        } else {
          setStatus(`已保存到 ${result.outputDir}`, "success");
        }
      } catch (error) {
        setStatus(error.message, "error");
      } finally {
        setBusy(false);
      }
    });

    els.png.addEventListener("click", async () => {
      if (busy) return;
      try {
        setBusy(true, "正在导出 PNG", "正在检查分页、调用本地 Chrome/Edge 截图并写入输出文件夹。");
        if (!currentDeck) await renderPreview();
        if (!currentDeck) return;
        setStatus("正在调用本地 Chrome/Edge 导出 PNG...");
        const result = await postJson("/api/export-png", payload());
        const overflowPages = result.report?.overflowPages || result.overflowReport.filter((item) => item.hasOverflow).map((item) => item.index);
        await postJson("/api/open", { path: result.outputDir });
        const warnings = [];
        if (result.report?.exceedsXhsLimit) {
          warnings.push(`共 ${result.report.slideCount} 张，超过小红书单次 18 张上限`);
        }
        if (overflowPages.length) {
          warnings.push(`第 ${overflowPages.join("、")} 张可能溢出，请降低每页字数或每页块数后重新生成`);
        }
        setStatus(
          warnings.length
            ? `已导出 ${result.files.length} 张卡片，但需要注意：${warnings.join("；")}。`
            : `已导出 ${result.files.length} 张卡片到 ${result.outputDir}`,
          warnings.length ? "warning" : "success",
        );
      } catch (error) {
        setStatus(error.message, "error");
      } finally {
        setBusy(false);
      }
    });

    fetch("/api/system")
      .then((res) => res.json())
      .then((system) => {
        if (system.defaultOutput) els.outputDir.placeholder = system.defaultOutput;
        if (system.chromePath) {
          els.chromePath.value = system.chromePath;
          setStatus("已检测到 Chrome/Edge，准备就绪。");
        }
      })
      .catch(() => {});
  </script>
</body>
</html>
