<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小红书卡片生成器</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="app">
    <aside class="panel">
      <header>
        <p class="eyebrow">Markdown 转图文卡片</p>
        <h1>小红书卡片生成器</h1>
      </header>

      <label>
        Markdown 文件
        <input id="file" type="file" accept=".md,.markdown,.mdown,text/markdown,text/plain" />
      </label>

      <label>
        Markdown 内容
        <textarea id="markdown" placeholder="选择一个 Markdown 文件，或直接粘贴内容"></textarea>
      </label>

      <div class="grid">
        <label>
          标题
          <input id="title" placeholder="可选，不填则读取文章标题" />
        </label>
        <label>
          底部署名
          <input id="brand" placeholder="显示在卡片底部" />
        </label>
        <label>
          每页字数
          <input id="maxChars" type="number" min="120" value="360" />
          <span class="field-note">控制每张卡片的文字密度，越小拆页越多。</span>
        </label>
        <label>
          每页块数
          <input id="maxBlocks" type="number" min="1" value="4" />
          <span class="field-note">段落、列表、代码块、表格都会算作内容块。</span>
        </label>
      </div>

      <label class="hidden-control">
        主题风格
        <select id="theme">
          <option value="warm-tech">暖色技术风</option>
          <option value="clean-white">清爽白底</option>
          <option value="dark-code">深色代码风</option>
          <option value="mint-editorial">薄荷杂志风</option>
          <option value="tech-black-gold">技术黑金</option>
          <option value="minimal-paper">极简纸感</option>
          <option value="magazine-bold">杂志标题风</option>
          <option value="notebook-soft">日系手账</option>
          <option value="launch-deck">产品发布会风</option>
          <option value="academic-note">学术笔记风</option>
        </select>
      </label>

      <section>
        <p class="section-title">主题皮肤</p>
        <div id="themeGrid" class="theme-grid"></div>
      </section>

      <label>
        输出文件夹路径
        <input id="outputDir" placeholder="可选，默认保存到桌面 xhs-cardgen-exports" />
      </label>

      <label>
        Chrome 或 Edge 路径
        <input id="chromePath" placeholder="留空时自动检测" />
      </label>

      <p class="hint">PNG 导出由本地服务调用系统 Chrome 或 Edge 完成，文件会直接写入输出文件夹。</p>
      <p class="hint">当前版本只使用规则解析和分页，不会调用 LLM 大模型改写或筛选内容。</p>

      <section class="system-card" aria-label="环境检测">
        <h2>环境检测</h2>
        <div class="system-grid">
          <div class="system-row"><b>版本</b><span id="systemVersion">检测中...</span></div>
          <div class="system-row"><b>系统</b><span id="systemPlatform">检测中...</span></div>
          <div class="system-row"><b>端口</b><span id="systemPort">检测中...</span></div>
          <div class="system-row"><b>默认输出</b><span id="systemOutput">检测中...</span></div>
          <div class="system-row"><b>浏览器</b><span id="systemChrome">检测中...</span></div>
        </div>
        <button id="copyDiagnostics" class="secondary" type="button">复制诊断信息</button>
      </section>

      <div class="actions">
        <button id="preview">预览</button>
        <button id="save">保存 HTML/JSON</button>
        <button id="png" class="primary">导出 PNG</button>
      </div>

      <p id="status" class="status">准备就绪</p>

      <section id="editor" class="editor" aria-label="卡片内容编辑">
        <div class="editor-header">
          <p class="section-title">卡片内容编辑</p>
          <div class="draft-actions">
            <button id="restoreDraft" type="button">恢复草稿</button>
            <button id="clearDraft" type="button">清除草稿</button>
          </div>
        </div>
        <div id="slideList" class="slide-list"></div>
        <div class="editor-actions">
          <button id="moveUp" type="button">上移</button>
          <button id="moveDown" type="button">下移</button>
          <button id="duplicateSlide" type="button">复制</button>
          <button id="deleteSlide" type="button">删除</button>
        </div>
        <div id="editorFields" class="editor-fields"></div>
        <div class="block-actions">
          <select id="newBlockType">
            <option value="subheading">子标题</option>
            <option value="paragraph">段落</option>
            <option value="quote">引用</option>
            <option value="bullets">无序列表</option>
            <option value="steps">有序列表</option>
            <option value="code">代码</option>
            <option value="answer">答案</option>
            <option value="image">图片</option>
          </select>
          <button id="addBlock" type="button">新增内容块</button>
        </div>
        <button id="applyEditor" class="apply-editor primary" type="button">应用修改</button>
      </section>
    </aside>

    <main class="preview">
      <iframe id="frame" title="Card preview"></iframe>
    </main>
  </div>

  <div id="busyOverlay" class="busy-overlay" aria-live="polite" aria-busy="true">
    <div class="busy-box">
      <p id="busyTitle" class="busy-title">正在处理</p>
      <p id="busyText" class="busy-text">请稍候，当前操作完成前暂时不能编辑或重复点击。</p>
    </div>
  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
